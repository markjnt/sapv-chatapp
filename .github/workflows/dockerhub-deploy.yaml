name: Docker Image CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: markjnt/sapv-chatapp
          cache-from: type=registry,ref=docker.io/markjnt/sapv-chatapp:buildcache
          cache-to: type=registry,ref=docker.io/markjnt/sapv-chatapp:buildcache,mode=max

  deploy:
    runs-on: self-hosted
    needs: [build-image]
    steps:
      - name: Pull & restart
        run: |
          cd "$HOME/sapv-chatapp"
          docker compose pull
          docker compose up -d
          docker image prune -f
